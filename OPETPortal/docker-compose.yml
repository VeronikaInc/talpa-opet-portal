services:
  web:
    build:
      context: ./OPETPortal.Web
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CONNECTION_STRING=Host=db;Port=5432;Database=opetportal;Username=postgres;Password=postgres
      - Admin__Username=admin
      - Admin__Password=changeme
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opetportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
